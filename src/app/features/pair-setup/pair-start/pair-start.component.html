<div class="page">

  <app-pair-setup-progress [currentStep]="1" [currentStepLabel]="'Выберите способ создания пары'"></app-pair-setup-progress>

  <p class="subtitle">Добро пожаловать — теперь вы с нами ✨</p>
  <p class="subtitle">Осталось совсем немного: подключите партнёра любым удобным способом.</p>
  <p class="subtitle">Отправьте свой код или введите код, который получили от партнёра 🔗</p>

  <div class="actions">
    <ui-button
      size="lg"
      variant="solid"
      color="primary"
      [full]="true"
      type="button"
      routerLink="/app/pair-setup/invite">
      СОЗДАТЬ СВОЙ КОД
    </ui-button>

    <ui-button
      size="lg"
      variant="solid"
      color="brand"
      [full]="true"
      type="button"
      routerLink="/app/pair-setup/join">
      ВВЕСТИ КОД ПАРТНЁРА
    </ui-button>
  </div>
</div>
