<div class="page">

  <app-pair-setup-progress [currentStep]="3" [currentStepLabel]="'Создание пары'"></app-pair-setup-progress>

  @if (!hasPair()) {
    <p class="subtitle">Мы связываем ваши аккаунты и открываем доступ к общим заметкам 🔄</p>
    <p class="subtitle">Обычно это занимает всего несколько секунд ⏳</p>
  } @else {
    <p class="subtitle">Пара создана ✅ — открываем общие заметки и остальные функции приложения.</p>
  }

  <div class="actions">
    <ui-button
      size="lg"
      variant="outline"
      color="neutral"
      [full]="true"
      type="button"
      routerLink="/app/pair-setup">
      НАЗАД
    </ui-button>
  </div>
</div>
