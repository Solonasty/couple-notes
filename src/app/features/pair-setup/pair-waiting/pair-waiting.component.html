<div class="page">

  <app-pair-setup-progress [currentStep]="3" [currentStepLabel]="'Создание пары'"></app-pair-setup-progress>

  @if (!hasPair()) {
    <p class="subtitle">Мы связываем ваши аккаунты и открываем доступ к общим заметкам и еженедельному отчёту.
      Это обычно занимает несколько секунд.</p>
  } @else {
    <h1 class="title">Пара создана ✅</h1>
    <p class="subtitle">Всё готово — открываем общие заметки и остальные функции приложения.</p>
  }

  <div class="actions">
    <ui-button
    size="lg"
    variant="outline"
    color="primary"
      [full]="true"

      type="button"
      routerLink="/app/pair-setup">
      НАЗАД
    </ui-button>
  </div>
</div>
