<div class="page">
  <h1 class="title">Пригласить партнёра</h1>
  <p class="subtitle">Партнёр вводит код в разделе “Присоединиться”.</p>

  @if (error()) {
    <div class="form-error" role="alert">{{ error() }}</div>
  }

  <div class="card">
    <div class="code">{{ code() ?? '—' }}</div>
    <div class="status">{{ statusText() }}</div>
  </div>

  <div class="actions">
    <ui-button
      class="ui-btn--h56 ui-btn--no-dim"
      [full]="true"
      variant="primary"
      type="button"
      (click)="copyCode()"
      [disabled]="!code()">
      Скопировать код
    </ui-button>

    <ui-button
      class="ui-btn--h56 ui-btn--no-dim"
      [full]="true"
      variant="outline"
      type="button"
      (click)="generate()"
      [disabled]="loading()"
      [loading]="loading()">
      Сгенерировать новый код
    </ui-button>

    <ui-button
      class="ui-btn--h56 ui-btn--no-dim"
      [full]="true"
      variant="outline"
      type="button"
      routerLink="/app/pair-setup">
      Назад
    </ui-button>
  </div>
</div>
