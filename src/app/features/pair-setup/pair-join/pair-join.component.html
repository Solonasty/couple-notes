<div class="page">

  <app-pair-setup-progress [currentStep]="2" [currentStepLabel]="'Введите код'"></app-pair-setup-progress>

  <p class="subtitle">Введите код, который прислал вам партнёр.
    После этого вы подключитесь к паре.</p>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <ui-input
      formControlName="code"
      type="text"
      placeholder="Код (например ZNEQQW)"
      autocomplete="one-time-code">
    </ui-input>

    @if (error()) {
      <div class="form-error" role="alert">{{ error() }}</div>
    }

    <div class="actions">
      <ui-button
        size="lg"
        variant="solid"
        color="brand"
        [full]="true"
        type="submit"
        [disabled]="form.invalid || loading()"
        [loading]="loading()">
        ПРИСОЕДЕНИТЬСЯ
      </ui-button>

      <ui-button
        size="lg"
        variant="outline"
        color="neutral"
        [full]="true"
        type="button"
        routerLink="/app/pair-setup"
        [disabled]="loading()">
        НАЗАД
      </ui-button>
    </div>
  </form>
</div>
