<div class="page">
  <h1 class="title">Войти в CoupleNotes</h1>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">

    <div class="fields">
      <ui-input
        formControlName="email"
        type="email"
        placeholder="Email"
        autocomplete="email">
      </ui-input>

      <ui-input
        formControlName="password"
        type="password"
        placeholder="Пароль"
        autocomplete="current-password">
      </ui-input>
    </div>

    @if (error()) {
      <div class="form-error" role="alert">{{ error() }}</div>
    }

    @if (loading()) {
      <div class="form-loading" aria-live="polite">
        <span class="form-loading__spinner" aria-hidden="true"></span>
      </div>
    }

    <div class="actions">
      <ui-button
        size="lg"
        variant="solid"
        color="primary"
        [full]="true"
        type="submit"
        [disabled]="form.invalid || loading()"
        [loading]="loading()">
        ВОЙТИ
      </ui-button>

      <ui-button
        size="lg"
        variant="outline"
        color="neutral"
        [full]="true"
        type="button"
        [disabled]="loading()"
        routerLink="/auth/register">
        ЗАРЕГИСТРИРОВАТЬСЯ
      </ui-button>
    </div>

  </form>
</div>
