<div class="page">
  <div class="page-header">
    <header class="page-header__row">
      <div class="page-header__title">
        <h1 class="page-header__h1">Пара</h1>
      </div>
    </header>
  </div>

  <div class="card">
    <div class="section">
      <h2 class="section-title">Ваша пара</h2>

      @if (profile()?.pairId) {
        <div class="pair-block">
          <div class="pair-meta">
            <div class="label">Партнёр</div>
            <div class="value">{{ partnerLabel() }}</div>
          </div>

          <ui-button
            size="lg"
            variant="outline"
            color="danger"
            [full]="true"
            type="button"
            [disabled]="saving()"
            [loading]="saving()"
            (click)="breakPair()">
            РАЗОРВАТЬ ПАРУ
          </ui-button>
        </div>
      } @else {
        <p class="muted">Пара не активна</p>
      }
    </div>

    @if (error()) {
      <div class="form-error" role="alert">{{ error() }}</div>
    }

    @if (ok()) {
      <div class="form-ok" role="status">{{ ok() }}</div>
    }
  </div>
</div>
