<div class="page">
  <div class="page-header">
    <header class="page-header__row">
      <div class="page-header__title">
        <h1 class="page-header__h1">Дайджест недели</h1>
      </div>
    </header>
  </div>

  <div class="card">
    <!-- Статус и период -->
    <div class="section">
      <p class="status">{{ statusText() }}</p>

      <!-- @if (periodText()) {
        <div class="meta-line">
          <p class="status">Отчет за:</p>
          <span>{{ periodText() }}</span>
        </div>
      } -->
    </div>

    @if (loading()) {
    <div class="section">
        <div class="hint">Генерация отчёта…</div>
    </div>
  }

    <!-- Ошибки -->
    @if (uiError()) {
      <div class="form-error" role="alert">{{ uiError() }}</div>
    }

    @if ((target() === 'current' ? report() : previousReport())?.status === 'error') {
      <div class="form-error" role="alert">
        {{ (target() === 'current' ? report() : previousReport())?.error }}
      </div>
    }

    <!-- Текст отчёта -->
    @if (summary()) {
      <div class="section">
        <div class="report-md" [innerHTML]="summaryHtml()"></div>
      </div>
    }
  </div>
</div>
