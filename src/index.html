<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CoupleNotes</title>
  <base href="/"/>

  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/logo/icon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <link rel="manifest" href="manifest.webmanifest"/>

  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/ios/apple-touch-icon-180x180.png"> <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/ios/apple-touch-icon-167x167.png"> <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/ios/apple-touch-icon-152x152.png"> <link rel="apple-touch-icon" sizes="120x120" href="assets/icons/ios/apple-touch-icon-120x120.png">
  <style>
     .app-splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity .22s ease, visibility .22s ease;
    }

    .app-splash--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,.16);
      border-top-color: #835de1;
      border-right-color: #835de1;
      animation: app-spin .8s linear infinite;
    }

    @keyframes app-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app-splash" class="app-splash" aria-label="Загрузка приложения">
    <div class="app-spinner"></div>
  </div>

  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
